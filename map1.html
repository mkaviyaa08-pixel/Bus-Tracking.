<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Tracking System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0; font-family: 'Arial', sans-serif;
            background: #222; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 15px; color: white; width: 400px; text-align: center;
        }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 95%; padding: 10px; background: #ff6600; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        
        /* Map Style - Hidden until login */
        #map-container { display: none; width: 90vw; height: 80vh; background: white; border-radius: 15px; overflow: hidden; position: relative; }
        #map { height: 100%; width: 100%; }
        
        .list { background: white; color: black; position: absolute; width: 90%; max-height: 100px; overflow-y: auto; z-index: 100; text-align: left; }
        .list div { padding: 5px; border-bottom: 1px solid #ddd; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui-box" class="container">
        <div id="login-form">
            <h2>🚍 Bus Login</h2>
            <input type="text" id="username" placeholder="Username (admin)">
            <input type="password" id="password" placeholder="Password (1234)">
            <button onclick="checkLogin()">Login</button>
        </div>

        <div id="search-form" style="display:none;">
            <h2>📍 Track Bus</h2>
            <input type="text" id="from" placeholder="From (e.g. Chennai)" onkeyup="suggest('from')">
            <div id="fromList" class="list"></div>
            <input type="text" id="to" placeholder="To" onkeyup="suggest('to')">
            <div id="toList" class="list"></div>
            <button onclick="showMap()">Track Now</button>
        </div>
    </div>

    <div id="map-container">
        <button onclick="goBack()" style="position:absolute; top:10px; right:10px; z-index:1000; width:auto;">Close Map</button>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;

        function checkLogin() {
            if(document.getElementById("username").value === "admin" && document.getElementById("password").value === "1234") {
                document.getElementById("login-form").style.display = "none";
                document.getElementById("search-form").style.display = "block";
            } else { alert("Wrong credentials!"); }
        }

        function showMap() {
            document.getElementById("ui-box").style.display = "none";
            document.getElementById("map-container").style.display = "block";
            
            // Initialize Map if not already done
            if (!map) {
                map = L.map('map').setView([11.0168, 76.9558], 12); // Centered on Coimbatore
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(map);
                
                // Add a sample Bus Marker
                L.marker([11.0168, 76.9558]).addTo(map).bindPopup("Bus MTC-101 is here").openPopup();
            }
        }

        function goBack() {
            document.getElementById("map-container").style.display = "none";
            document.getElementById("ui-box").style.display = "block";
        }

        // Suggestions logic (simplified)
        function suggest(id) {
            let val = document.getElementById(id).value;
            let list = document.getElementById(id + "List");
            if(val.length > 2) {
                list.innerHTML = `<div onclick="select('${id}', '${val}')">${val} Station</div>`;
            } else { list.innerHTML = ""; }
        }
        function select(id, val) { 
            document.getElementById(id).value = val; 
            document.getElementById(id + "List").innerHTML = ""; 
        }
    </script>
</body>
</html>
